name: CI Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.5.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Slack 알림 (CI 실패)
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_DEPLOY }} \
            -H 'Content-type: application/json' \
            -d '{"text":"❌ [shoong-frontend] PR 검증 실패 | `${{ github.head_ref }}` → `${{ github.base_ref }}` | ${{ github.actor }}"}'

  deploy:
    needs: typecheck-and-lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23.5.0'
          cache: npm

      - run: npm ci
      - run: npm run build

      # OIDC로 AWS 인증 (IAM OIDC 모듈이 이미 있음)
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # index.html은 no-cache, 나머지는 1년 캐시
      - name: Upload index.html
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Upload assets
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "index.html" \
            --cache-control "max-age=31536000, immutable" \
            --delete

      # CloudFront index.html 캐시 무효화
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/index.html"

      - name: Slack 알림 (배포 성공)
        if: success()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_DEPLOY }} \
            -H 'Content-type: application/json' \
            -d '{"text":"[shoong-frontend] S3 배포 완료 | `${{ github.ref_name }}` | ${{ github.actor }}"}'

      - name: Slack 알림 (배포 실패)
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_DEPLOY }} \
            -H 'Content-type: application/json' \
            -d '{"text":"❌ [shoong-frontend] S3 배포 실패 | `${{ github.ref_name }}` | ${{ github.actor }}"}'
